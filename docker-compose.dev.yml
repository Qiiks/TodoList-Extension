version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://teamtodo:password@db:5432/teamtodo}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use}
      ADMIN_GITHUB_USERNAME: ${ADMIN_GITHUB_USERNAME:-admin}
      PORT: ${PORT:-3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:3000/api/auth/github/callback}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamtodo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-teamtodo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamtodo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
